spring.application.name=ProyectoBolsaEmpleo

server.port=8080
#Base de Datos MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Costa_Rica
spring.datasource.username=root
spring.datasource.password=RootPri0811.ABC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA/HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# THYMELEAF
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Subida Archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta de uploads
app.upload.dir=uploads/

# Errores
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
