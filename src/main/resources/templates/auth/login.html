<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Iniciar sesión</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background-color: #2c3e6b;
            padding: 14px 40px;
        }

        nav a {
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
        }

        .pagina {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border: 1px solid #dde3ed;
            border-radius: 10px;
            padding: 36px 40px;
            width: 100%;
            max-width: 420px;
        }

        .card h1 {
            font-size: 1.4rem;
            color: #2c3e6b;
            margin-bottom: 6px;
        }

        .card .subtitulo {
            font-size: 0.88rem;
            color: #888;
            margin-bottom: 24px;
        }

        .alerta {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.88rem;
            margin-bottom: 18px;
        }

        .alerta-error  { background: #fdecea; color: #c0392b; border: 1px solid #f5c6c6; }
        .alerta-verde  { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }
        .alerta-azul   { background: #eaf4fb; color: #1a6da3; border: 1px solid #aed6f1; }

        .campo {
            margin-bottom: 16px;
        }

        .campo label {
            display: block;
            font-size: 0.82rem;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .campo input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            background-color: #fafafa;
        }

        .campo input:focus {
            outline: none;
            border-color: #4a90d9;
            background-color: white;
        }

        button[type="submit"] {
            width: 100%;
            padding: 11px;
            background-color: #2c3e6b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.97rem;
            font-family: inherit;
            cursor: pointer;
            margin-top: 6px;
        }

        button[type="submit"]:hover {
            background-color: #243358;
        }

        .links {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .links a {
            font-size: 0.88rem;
            color: #4a90d9;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        footer {
            background-color: #2c3e6b;
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 16px;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/}">💼 BolsaEmpleos</a>
</nav>

<div class="pagina">
    <div class="card">
        <h1>Iniciar sesión</h1>
        <p class="subtitulo">Ingresa tus datos para continuar</p>

        <div class="alerta alerta-verde" th:if="${mensaje}" th:text="${mensaje}"></div>
        <div class="alerta alerta-error" th:if="${param.error}">Credenciales inválidas o usuario no aprobado.</div>
        <div class="alerta alerta-azul"  th:if="${param.logout}">Sesión cerrada correctamente.</div>

        <form th:action="@{/login}" method="post">

            <div class="campo">
                <label for="username">Correo electrónico</label>
                <input type="text" id="username" name="username" placeholder="tu@correo.com" required>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Entrar</button>
        </form>

        <div class="links">
            <a th:href="@{/registro/oferente}">Registrarme como candidato</a>
            <a th:href="@{/registro/empresa}">Registrar mi empresa</a>
            <a th:href="@{/}">← Volver al inicio</a>
        </div>
    </div>
</div>

</body>
</html>
