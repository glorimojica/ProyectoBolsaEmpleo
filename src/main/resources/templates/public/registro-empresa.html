<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Registro Empresa</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background-color: #2c3e6b;
            padding: 14px 40px;
        }

        nav a {
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
        }

        .pagina {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border: 1px solid #dde3ed;
            border-radius: 10px;
            padding: 36px 40px;
            width: 100%;
            max-width: 520px;
        }

        .card h1 {
            font-size: 1.4rem;
            color: #2c3e6b;
            margin-bottom: 6px;
        }

        .card .subtitulo {
            font-size: 0.88rem;
            color: #888;
            margin-bottom: 24px;
        }

        .alerta-error {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.88rem;
            margin-bottom: 18px;
            background: #fdecea;
            color: #c0392b;
            border: 1px solid #f5c6c6;
        }

        .fila {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .campo {
            margin-bottom: 16px;
        }

        .campo label {
            display: block;
            font-size: 0.82rem;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .campo input,
        .campo textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            background-color: #fafafa;
        }

        .campo textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        .campo input:focus,
        .campo textarea:focus {
            outline: none;
            border-color: #f0b429;
            background-color: white;
        }

        .separador {
            border: none;
            border-top: 1px solid #eee;
            margin: 8px 0 16px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 11px;
            background-color: #f0b429;
            color: #333;
            border: none;
            border-radius: 6px;
            font-size: 0.97rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            margin-top: 6px;
        }

        button[type="submit"]:hover {
            background-color: #d9a020;
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            font-size: 0.88rem;
            color: #4a90d9;
            text-decoration: none;
        }

        .links a:hover { text-decoration: underline; }

        footer {
            background-color: #2c3e6b;
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 16px;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/}">💼 BolsaEmpleos</a>
</nav>

<div class="pagina">
    <div class="card">
        <h1>Registro de empresa</h1>
        <p class="subtitulo">Crea tu cuenta para publicar ofertas de empleo</p>

        <div class="alerta-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/registro/empresa}" method="post">

            <div class="campo">
                <label for="nombre">Nombre de la empresa</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Acme S.A." required>
            </div>

            <div class="fila">
                <div class="campo">
                    <label for="localizacion">Localización</label>
                    <input type="text" id="localizacion" name="localizacion" placeholder="Ciudad, País" required>
                </div>
                <div class="campo">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" name="telefono" placeholder="2222-2222" required>
                </div>
            </div>

            <div class="campo">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="contacto@empresa.com" required>
            </div>

            <div class="campo">
                <label for="descripcion">Descripción de la empresa</label>
                <textarea id="descripcion" name="descripcion" placeholder="¿A qué se dedica la empresa?" required></textarea>
            </div>

            <hr class="separador">

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit">Registrar empresa</button>
        </form>

        <div class="links">
            <a th:href="@{/login}">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>
</div>

<footer>
    © 2025 BolsaEmpleos — Todos los derechos reservados
</footer>

</body>
</html>
