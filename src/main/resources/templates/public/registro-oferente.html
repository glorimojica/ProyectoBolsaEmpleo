<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro Oferente</title>
    <meta charset="UTF-8">
</head>
<body>
<h1>Registro de Oferente</h1>

<p th:if="${error}" th:text="${error}" style="color:red;"></p>

<form th:action="@{/registro/oferente}" method="post">
    <label>Identificación:</label><br>
    <input type="text" name="identificacion" required><br><br>

    <label>Nombre:</label><br>
    <input type="text" name="nombre" required><br><br>

    <label>Primer apellido:</label><br>
    <input type="text" name="apellido" required><br><br>

    <label>Nacionalidad:</label><br>
    <input type="text" name="nacionalidad" required><br><br>

    <label>Teléfono:</label><br>
    <input type="text" name="telefono" required><br><br>

    <label>Correo electrónico:</label><br>
    <input type="email" name="correo" required><br><br>

    <label>Lugar de residencia:</label><br>
    <input type="text" name="residencia" required><br><br>

    <label>Contraseña:</label><br>
    <input type="password" name="password" required><br><br>

    <button type="submit">Registrar Oferente</button>
</form>
</body>
</html>
