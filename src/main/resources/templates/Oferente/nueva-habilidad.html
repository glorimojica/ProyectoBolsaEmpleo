<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar habilidad</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background-color: #2c3e6b;
            padding: 14px 40px;
        }

        nav a {
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
        }

        .pagina {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border: 1px solid #dde3ed;
            border-radius: 10px;
            padding: 36px 40px;
            width: 100%;
            max-width: 520px;
        }

        h1 {
            color: #2c3e6b;
            margin-bottom: 6px;
        }

        .sub {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 24px;
        }

        .alerta {
            background: #fdecea;
            color: #c0392b;
            border: 1px solid #f5c6c6;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.88rem;
        }

        .campo {
            margin-bottom: 18px;
        }

        .campo label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #555;
        }

        .campo input,
        .campo select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background-color: #fafafa;
        }

        .campo input:focus,
        .campo select:focus {
            outline: none;
            border-color: #1abc9c;
            background-color: white;
        }

        .acciones {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 14px;
            border-radius: 6px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-guardar {
            background-color: #1abc9c;
            color: white;
        }

        .btn-volver {
            background-color: #eaf4fb;
            color: #1a6da3;
            border: 1px solid #aed6f1;
            text-decoration: none;
            display: inline-block;
        }

        footer {
            background-color: #2c3e6b;
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 16px;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/oferente/dashboard}">💼 BolsaEmpleos</a>
</nav>

<div class="pagina">
    <div class="card">
        <h1>Agregar habilidad</h1>
        <p class="sub">Selecciona una característica y define tu nivel.</p>

        <div th:if="${error}" class="alerta" th:text="${error}"></div>

        <form th:action="@{/oferente/habilidades}" method="post">

            <div class="campo">
                <label>Característica</label>
                <select name="caracteristicaId" required>
                    <option value="">Seleccione una opción</option>
                    <option th:each="c : ${caracteristicas}"
                            th:value="${c.id}"
                            th:text="${c.nombre}">
                    </option>
                </select>
            </div>

            <div class="campo">
                <label>Nivel (1-5)</label>
                <input type="number" name="nivel" min="1" max="5" required>
            </div>

            <div class="acciones">
                <button class="btn btn-guardar" type="submit">Guardar</button>
                <a th:href="@{/oferente/habilidades}" class="btn btn-volver">← Volver</a>
            </div>

        </form>
    </div>
</div>

<footer>
    © 2025 BolsaEmpleos
</footer>

</body>
</html>
