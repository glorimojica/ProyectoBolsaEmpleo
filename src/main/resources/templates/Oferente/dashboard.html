<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Candidato</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background: #2c3e6b;
            padding: 14px 40px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .pagina {
            flex: 1;
            padding: 40px 20px;
        }

        .contenedor {
            max-width: 900px;
            margin: auto;
        }

        .hero {
            background: #2c3e6b;
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            gap: 15px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #dde3ed;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-ver { background: #4a90d9; color: white; }
        .btn-add { background: #1abc9c; color: white; }

        .btn-logout {
            background: #eaf4fb;
            color: #1a6da3;
            border: 1px solid #aed6f1;
        }

        footer {
            background: #2c3e6b;
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/oferente/dashboard}">💼 BolsaEmpleos</a>
</nav>

<div class="pagina">
    <div class="contenedor">

        <div class="hero">
            <h1>Bienvenido oferente</h1>
            <p>Gestiona tus habilidades y mejora tu perfil profesional.</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Mis habilidades</h3>
                <p>Consulta y administra tus habilidades registradas.</p>
                <a th:href="@{/oferente/habilidades}" class="btn btn-ver">Ver habilidades</a>
            </div>

            <div class="card">
                <h3>Agregar habilidad</h3>
                <p>Añade nuevas habilidades para mejorar tu perfil.</p>
                <a th:href="@{/oferente/habilidades/nueva}" class="btn btn-add">Agregar</a>
            </div>

            <div class="card">
                <h3>Cerrar sesión</h3>
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-logout">Cerrar sesión</button>
                </form>
            </div>
        </div>

    </div>
</div>

<footer>
    © 2025 BolsaEmpleos
</footer>

</body>
</html>
