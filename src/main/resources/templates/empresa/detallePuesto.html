<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del puesto</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background-color: #2c3e6b;
            padding: 14px 40px;
        }

        nav a {
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
        }

        .pagina {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border: 1px solid #dde3ed;
            border-radius: 10px;
            padding: 36px 40px;
            width: 100%;
            max-width: 700px;
        }

        .card h1 {
            font-size: 1.5rem;
            color: #2c3e6b;
            margin-bottom: 6px;
        }

        .subtitulo {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 24px;
        }

        .detalle {
            display: grid;
            gap: 14px;
        }

        .item {
            background-color: #f9fbfd;
            border: 1px solid #e3ebf4;
            border-radius: 8px;
            padding: 14px 16px;
        }

        .item strong {
            display: block;
            font-size: 0.82rem;
            color: #2c3e6b;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .item span {
            font-size: 0.96rem;
            color: #444;
            line-height: 1.5;
        }

        .estado {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .estado-activo {
            background-color: #eafaf1;
            color: #1e8449;
            border: 1px solid #a9dfbf;
        }

        .estado-inactivo {
            background-color: #fdecea;
            color: #c0392b;
            border: 1px solid #f5c6c6;
        }

        .tipo-publico {
            background-color: #eaf4fb;
            color: #1a6da3;
            border: 1px solid #aed6f1;
        }

        .tipo-privado {
            background-color: #fef5e7;
            color: #b9770e;
            border: 1px solid #f9e0a8;
        }

        .acciones {
            margin-top: 24px;
        }

        .acciones a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 6px;
            background-color: #4a90d9;
            color: white;
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 500;
        }

        .acciones a:hover {
            background-color: #3a7fc5;
        }

        footer {
            background-color: #2c3e6b;
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 16px;
            font-size: 0.82rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/empresa/dashboard}">💼 BolsaEmpleos</a>
</nav>

<div class="pagina">
    <div class="card">
        <h1>Detalle del puesto</h1>
        <p class="subtitulo">Consulta la información completa del puesto publicado.</p>

        <div class="detalle">
            <div class="item">
                <strong>ID</strong>
                <span th:text="${puesto.id}">1</span>
            </div>

            <div class="item">
                <strong>Título</strong>
                <span th:text="${puesto.titulo}">Desarrollador Java</span>
            </div>

            <div class="item">
                <strong>Descripción</strong>
                <span th:text="${puesto.descripcion}">Descripción del puesto</span>
            </div>

            <div class="item">
                <strong>Salario</strong>
                <span th:text="${puesto.salario}">850000</span>
            </div>

            <div class="item">
                <strong>Tipo de publicación</strong>
                <span th:class="${puesto.publico} ? 'estado tipo-publico' : 'estado tipo-privado'"
                      th:text="${puesto.publico} ? 'Público' : 'Privado'">Público</span>
            </div>

            <div class="item">
                <strong>Estado</strong>
                <span th:class="${puesto.activo} ? 'estado estado-activo' : 'estado estado-inactivo'"
                      th:text="${puesto.activo} ? 'Activo' : 'Inactivo'">Activo</span>
            </div>
        </div>

        <div class="acciones">
            <a th:href="@{/empresa/puestos}">← Volver a mis puestos</a>
        </div>
    </div>
</div>

<footer>
    © 2025 BolsaEmpleos — Todos los derechos reservados
</footer>

</body>
</html>
